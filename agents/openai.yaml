interface:
  display_name: "WeChat Summary Skill"
  short_description: "交互式提取微信群聊，缺少 wx-cli / baoyu 时也可先做环境检查和初始化"
  default_prompt: "Use $wx-summary-skill to choose a WeChat group, pick a time preset, save the session defaults, and generate either a structured text digest or a People's Daily inspired local web newspaper. In webpage mode, default to the repo's newspaper-style workflow and wording instead of the older chat-digest prompt. If the repo was just cloned or wx-cli is not ready yet, run the bootstrap path first, then fall back to the built-in doctor/setup path."
